id: builtin
name: Builtin Tools
description: Built-in tools provided by AgentForge (echo, python_exec)
icon_url: https://cdn-icons-png.flaticon.com/128/1004/1004771.png
tool_type: builtin
categories: ["utilities"]
author: AgentForge
homepage: https://github.com
popularity: 100
is_official: true

tools:
  - name: echo
    display_name: Echo
    description: Echo back the input text
    input_schema:
      type: object
      properties:
        text:
          type: string
          description: Text to echo back
      required: ["text"]

  - name: python_exec
    display_name: Python Executor
    description: Execute Python code and return the result
    input_schema:
      type: object
      properties:
        code:
          type: string
          description: Python code to execute
      required: ["code"]
