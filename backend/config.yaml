# AgentForge Global Configuration YAML

# Base App Settings
APP_NAME: "AgentForge-Backend-Service"
ENV: "dev"
LOG_LEVEL: "INFO"
CORS_ALLOWED_ORIGINS:
  - "http://localhost:3000"
  - "http://localhost:4174"
  - "http://localhost:4175"
  - "http://localhost:5173"
  - "http://127.0.0.1:3000"
  - "http://127.0.0.1:4174"
  - "http://127.0.0.1:4175"
  - "http://127.0.0.1:5173"

# Database Configuration (Defaults)
# Dev/local runs are normalized to PROJECT_ROOT/agentforge_preview.db in backend/core/config.py.
DB_URL: "sqlite+aiosqlite:///./agentforge_preview.db"

# Redis Configuration (Defaults)
REDIS_URL: "redis://localhost:6379/0"

# Model Gateway Settings (Placeholders)
MODEL_API_KEY: "PLACEHOLDER_KEY"
